# Treasure Runner World Generator Config
# Reference configuration for world generation

[metadata]
# Human-readable name for this world
name=Integration Test World

# Seed for deterministic generation
# Use a positive integer for reproducible worlds
# Use "random" for non-deterministic generation
seed=40

[world]
# Total number of rooms to generate
num_rooms=8

# Difficulty level (1-10): scales treasure/pushable ratios
# Higher = fewer treasures to collect, more pushables to navigate
difficulty=6

[room]
# Base dimensions for each room (before variance)
width=20
height=15

# Random variance applied to each room's width/height
# Set to 0 for no variance (deterministic room sizes)
width_variance=2
height_variance=2

[portals]
# Average number of portals per room
# All portals are GUARANTEED to connect to a valid room
# Actual number per room varies: base +/- variance
portals_per_room=3
portals_variance=1

# Portal placement mode: "walls" (default) or "interior"
# - walls: portals appear on room boundaries (look like doors)
# - interior: portals can appear anywhere in the room
portal_placement=walls

# Connectivity probability for extra edges (0-100)
# After building the spanning tree, add extra edges with this probability
# Higher = more interconnected world (more optional paths)
connectivity_chance=30


[treasures]
# Average number of treasures per room (modified by difficulty)
# Actual number per room varies: base +/- variance
treasures_per_room=9
treasures_variance=0z

# Number of different treasure types (1-10)
# Each treasure is randomly assigned a type from 0 to (num_types-1)
# Students can define behavior for each type
treasure_types=1

[pushables]
# Average number of pushables per room (modified by difficulty)
# Actual number per room varies: base +/- variance
pushables_per_room=5
pushables_variance=1



[charset]
# Rendering characters (used by GameEngine and displayed in UI)
# Use escape sequences: \s for space, \t for tab, \n for newline, \\ for backslash
wall=#
floor=.
player=@
pushable=O
treasure=$
portal=X